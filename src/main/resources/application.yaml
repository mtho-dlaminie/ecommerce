spring:
  application:
    name: picknpay-ecommerce-assessment

  datasource:
    url: jdbc:h2:mem:ecommerce-db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

app:
  security:
    admin:
      username: admin
      password: admin123

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

info:
  app:
    name: Pick n Pay Ecommerce Assessment
    version: 1.0.0
    description: Technical assessment by Mthobisi Dlamini
